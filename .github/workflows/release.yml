name: Release macOS

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Sign, notarize, and publish
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag and source version
        shell: bash
        run: |
          set -euo pipefail
          source_version="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v$source_version" || {
            echo "Tag $GITHUB_REF_NAME does not match package version v$source_version" >&2
            exit 1
          }

      - name: Run release checks
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo check --manifest-path src-tauri/Cargo.toml --locked --all-targets
          cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml --locked --all-targets
          pnpm build

      - name: Validate release secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD APPLE_API_KEY_P8 APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_SIGNING_IDENTITY TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            test -n "${!name:-}" || {
              echo "Required GitHub Actions secret $name is not configured" >&2
              exit 1
            }
          done

      - name: Import Developer ID certificate
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/neon-localhost.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          rm -f "$certificate_path"

      - name: Restore notarization key
        id: notarization
        shell: bash
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "key_path=$key_path" >> "$GITHUB_OUTPUT"

      - name: Build signed universal DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ steps.notarization.outputs.key_path }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles app,dmg --target universal-apple-darwin

      - name: Notarize and verify DMG
        id: artifact
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ steps.notarization.outputs.key_path }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          assets="$RUNNER_TEMP/release-assets"
          mkdir -p "$assets"
          dmg="$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg"
          xcrun notarytool submit "$dmg" --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          spctl -a -t open --context context:primary-signature -vv "$dmg"

          mount_point="$RUNNER_TEMP/neon-localhost-dmg"
          mkdir -p "$mount_point"
          diskutil image attach --readOnly --nobrowse --mountPoint "$mount_point" "$dmg" >/dev/null
          cleanup_mount() {
            hdiutil detach "$mount_point" -quiet 2>/dev/null || true
          }
          trap cleanup_mount EXIT

          app="$(find "$mount_point" -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl -a -t exec -vv "$app"

          executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
          archs="$(lipo -archs "$app/Contents/MacOS/$executable")"
          for required_arch in arm64 x86_64; do
            [[ " $archs " == *" $required_arch "* ]] || {
              echo "Release app is missing required architecture $required_arch (found: $archs)" >&2
              exit 1
            }
          done

          cleanup_mount
          trap - EXIT

          updater="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz' -print -quit)"
          test -n "$updater"
          test -s "$updater.sig"

          staged_dmg="$assets/Neon.Localhost_${version}_universal.dmg"
          staged_updater="$assets/Neon.Localhost_${version}_universal.app.tar.gz"
          cp "$dmg" "$staged_dmg"
          cp "$updater" "$staged_updater"
          cp "$updater.sig" "$staged_updater.sig"
          node scripts/create-updater-json.mjs "$version" "$staged_updater" "$staged_updater.sig" "$assets/latest.json"

          checksum="$staged_dmg.sha256"
          (cd "$assets" && shasum -a 256 "$(basename "$staged_dmg")" > "$(basename "$checksum")")
          echo "dmg=$staged_dmg" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"
          echo "updater=$staged_updater" >> "$GITHUB_OUTPUT"
          echo "signature=$staged_updater.sig" >> "$GITHUB_OUTPUT"
          echo "metadata=$assets/latest.json" >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "${{ steps.artifact.outputs.dmg }}" \
              "${{ steps.artifact.outputs.checksum }}" \
              "${{ steps.artifact.outputs.updater }}" \
              "${{ steps.artifact.outputs.signature }}" \
              "${{ steps.artifact.outputs.metadata }}" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "${{ steps.artifact.outputs.dmg }}" \
              "${{ steps.artifact.outputs.checksum }}" \
              "${{ steps.artifact.outputs.updater }}" \
              "${{ steps.artifact.outputs.signature }}" \
              "${{ steps.artifact.outputs.metadata }}" \
              --verify-tag \
              --draft \
              --generate-notes \
              --title "Neon Localhost $GITHUB_REF_NAME"
          fi

      - name: Remove temporary signing material
        if: always()
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8 "$RUNNER_TEMP/developer-id.p12"
          security delete-keychain "$RUNNER_TEMP/neon-localhost.keychain-db" 2>/dev/null || true
