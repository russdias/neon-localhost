version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]
